name: PROD - Web App - app-prod-rentoombooking

on:
  push:
    branches:
      - main
    paths:
      - 'RentoomBookingWeb/**'
      - 'SharedClasses/**'
      - 'SharedFrontend/**'
      - '.github/workflows/main_app-prod-rentoombooking.yml'
  workflow_dispatch:

concurrency:
  group: app-prod-rentoombooking-main
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: app-prod-rentoombooking
  PROJECT_PATH: RentoomBookingWeb/RentoomBookingWeb.csproj
  PUBLISH_PATH: published-webapp
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore web app project
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build web app project
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish web app project
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-prod
          path: ${{ env.PUBLISH_PATH }}
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package-prod
          path: ${{ env.PUBLISH_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_90905777D7AA43A49591FCBC0251DD45 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1290CB1C386F449DA5019A29106B8197 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FCBA005BF5F84819BD8CEBE07F7E42B9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}
          
