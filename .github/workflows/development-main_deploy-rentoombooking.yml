name: DEV - Unified Deployment

on:
  push:
    branches:
      - development-main
    paths:
      - 'Api/**'
      - 'RentoomBookingWeb/**'
      - 'SharedClasses/**'
      - 'SharedFrontend/**'
      - 'StayWell/**'
      - '.github/workflows/development-main_deploy-rentoombooking.yml'
  workflow_dispatch:

concurrency:
  group: development-main-unified-deploy
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release
  ARTIFACT_ROOT: artifacts
  API_PUBLISH_PATH: artifacts/api
  WEBAPP_PUBLISH_PATH: artifacts/webapp
  STAYWELL_PUBLISH_PATH: artifacts/staywell
  STAYWELL_STATIC_PATH: artifacts/staywell/wwwroot
  STAYWELL_RUNTIME_ENV: Development
  AZURE_FUNCTIONAPP_NAME: func-dev-api-staywell
  AZURE_WEBAPP_NAME: app-dev-rentoombooking

jobs:
  changes:
    if: github.ref == 'refs/heads/development-main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_api: ${{ steps.detect.outputs.deploy_api }}
      deploy_webapp: ${{ steps.detect.outputs.deploy_webapp }}
      deploy_staywell: ${{ steps.detect.outputs.deploy_staywell }}
      any_deploy: ${{ steps.detect.outputs.any_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deployment targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy_api=true
            deploy_webapp=true
            deploy_staywell=true
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse HEAD^ >/dev/null 2>&1; then
                before="$(git rev-parse HEAD^)"
              else
                before=""
              fi
            fi

            if [ -n "$before" ]; then
              files="$(git diff --name-only "$before" "${{ github.sha }}")"
            else
              files="$(git ls-files)"
            fi

            printf 'Changed files:\n%s\n' "$files"

            deploy_api=false
            deploy_webapp=false
            deploy_staywell=false

            if echo "$files" | grep -Eq '^(Api/|SharedClasses/|\.github/workflows/development-main_deploy-rentoombooking\.yml$)'; then
              deploy_api=true
            fi

            if echo "$files" | grep -Eq '^(RentoomBookingWeb/|SharedClasses/|SharedFrontend/|\.github/workflows/development-main_deploy-rentoombooking\.yml$)'; then
              deploy_webapp=true
            fi

            if echo "$files" | grep -Eq '^(StayWell/|SharedClasses/|SharedFrontend/|\.github/workflows/development-main_deploy-rentoombooking\.yml$)'; then
              deploy_staywell=true
            fi
          fi

          any_deploy=false
          if [ "$deploy_api" = true ] || [ "$deploy_webapp" = true ] || [ "$deploy_staywell" = true ]; then
            any_deploy=true
          fi

          echo "deploy_api=$deploy_api" >> "$GITHUB_OUTPUT"
          echo "deploy_webapp=$deploy_webapp" >> "$GITHUB_OUTPUT"
          echo "deploy_staywell=$deploy_staywell" >> "$GITHUB_OUTPUT"
          echo "any_deploy=$any_deploy" >> "$GITHUB_OUTPUT"

  build:
    if: github.ref == 'refs/heads/development-main' && needs.changes.outputs.any_deploy == 'true'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore RentoomBooking.sln

      - name: Build solution
        run: dotnet build RentoomBooking.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Stamp StayWell runtime environment
        env:
          STAYWELL_RUNTIME_ENV: ${{ env.STAYWELL_RUNTIME_ENV }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("StayWell/wwwroot/appsettings.json")
          data = json.loads(path.read_text())
          data["ASPNETCORE_ENVIRONMENT_STAYWELL"] = os.environ["STAYWELL_RUNTIME_ENV"]
          path.write_text(json.dumps(data, indent=2) + "\n")
          print(f"Stamped {path} with ASPNETCORE_ENVIRONMENT_STAYWELL={data['ASPNETCORE_ENVIRONMENT_STAYWELL']}")
          PY

      - name: Publish Functions API
        run: dotnet publish Api/RentoomBooking.Api.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ${{ env.API_PUBLISH_PATH }}

      - name: Publish booking web app
        run: dotnet publish RentoomBookingWeb/RentoomBookingWeb.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ${{ env.WEBAPP_PUBLISH_PATH }}

      - name: Publish StayWell static web app
        run: dotnet publish StayWell/RentoomBooking.StayWell.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ${{ env.STAYWELL_PUBLISH_PATH }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-deployment-packages
          path: ${{ env.ARTIFACT_ROOT }}
          include-hidden-files: true

  deploy_functions:
    if: github.ref == 'refs/heads/development-main' && needs.changes.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-deployment-packages
          path: ${{ env.ARTIFACT_ROOT }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_FUNC_DEV_API_STAYWELL }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.API_PUBLISH_PATH }}

  deploy_webapp:
    if: github.ref == 'refs/heads/development-main' && needs.changes.outputs.deploy_webapp == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-deployment-packages
          path: ${{ env.ARTIFACT_ROOT }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_APP_DEV_RENTOOMBOOKING }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: ${{ env.WEBAPP_PUBLISH_PATH }}

  deploy_staywell:
    if: github.ref == 'refs/heads/development-main' && needs.changes.outputs.deploy_staywell == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
    permissions:
      contents: read

    steps:
      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-deployment-packages
          path: ${{ env.ARTIFACT_ROOT }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAYWELL_DEV }}
          action: upload
          app_location: ${{ env.STAYWELL_STATIC_PATH }}
          skip_app_build: true
