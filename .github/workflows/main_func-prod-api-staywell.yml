name: PROD - Functions API - func-prod-api-staywell

on:
  push:
    branches:
      - main
    paths:
      - 'Api/**'
      - 'SharedClasses/**'
      - '.github/workflows/main_func-prod-api-staywell.yml'
  workflow_dispatch:

concurrency:
  group: func-prod-api-staywell-main
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: func-prod-api-staywell
  PROJECT_PATH: Api/RentoomBooking.Api.csproj
  PUBLISH_PATH: published-api
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API project
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build API project
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API project
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-function-package-prod
          path: ${{ env.PUBLISH_PATH }}
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: api-function-package-prod
          path: ${{ env.PUBLISH_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_FUNC_PROD_API_STAYWELL }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}
