# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: DEV - Booking Website - app-dev-rentoombooking

on:
  push:
    branches:
      - development-main
    paths:
      - 'RentoomBookingWeb/**'
      - 'SharedClasses/**'
      - 'SharedFrontend/**'
      - '.github/workflows/development-main_app-dev-rentoombooking.yml'
  workflow_dispatch:

jobs:
  build:
    if: github.ref == 'refs/heads/development-main'
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build RentoomBooking.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish RentoomBookingWeb\RentoomBookingWeb.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    if: github.ref == 'refs/heads/development-main'
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_APP_DEV_RENTOOMBOOKING }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-dev-rentoombooking'
          slot-name: 'Production'
          package: .
          
