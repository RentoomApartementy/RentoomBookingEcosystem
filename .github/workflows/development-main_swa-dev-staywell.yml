name: STAYWELL DEV - Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - development-main
 # pull_request:
 #   types: [closed]
 #   branches:
 #     - development-main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Stamp StayWell runtime environment
        shell: bash
        run: |
          export STAYWELL_RUNTIME_ENV="${ASPNETCORE_ENVIRONMENT_STAYWELL:-Development}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("StayWell/wwwroot/appsettings.json")
          data = json.loads(path.read_text())
          data["ASPNETCORE_ENVIRONMENT_STAYWELL"] = os.environ["STAYWELL_RUNTIME_ENV"]
          path.write_text(json.dumps(data, indent=2) + "\n")
          print(f"Stamped {path} with ASPNETCORE_ENVIRONMENT_STAYWELL={data['ASPNETCORE_ENVIRONMENT_STAYWELL']}")
          PY
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAYWELL_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./StayWell" # App source code path
          #api_location: "" # Api source code path - optional
          output_location: "wwwroot" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAYWELL_DEV }}
          action: "close"
