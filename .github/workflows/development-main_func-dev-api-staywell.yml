name: API DEV - func-dev-api-staywell

on:
  push:
    branches:
      - development-main
    paths:
      - 'Api/**'
      - 'SharedClasses/**'
      - '.github/workflows/development-main_func-dev-api-staywell.yml'
  workflow_dispatch:

concurrency:
  group: func-dev-api-staywell-development-main
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: func-dev-api-staywell
  PROJECT_PATH: Api/RentoomBooking.Api.csproj
  PUBLISH_PATH: function-releases
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API project
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build API project
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API project
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-function-package-dev
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: api-function-package-dev
          path: ${{ env.PUBLISH_PATH }}
      - name: Debug Azure vars presence
        run: |
          echo "CLIENT_ID_SET=${{ vars.AZURE_CLIENT_ID_FUNC_DEV_API_STAYWELL != '' }}"
          echo "TENANT_ID_SET=${{ vars.AZURE_TENANT_ID_DEV != '' }}"
          echo "SUBSCRIPTION_ID_SET=${{ vars.AZURE_SUBSCRIPTION_ID_DEV != '' }}"  
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_FUNC_DEV_API_STAYWELL }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}
