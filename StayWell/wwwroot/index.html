<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentoomBooking.StayWell</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="rentoom-logo-color.svg" />
    <link href="RentoomBooking.StayWell.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="rentoom-logo-color.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="rentoom-logo-color.svg" />
</head>

<body>
    <style>
        .loading-logo {
            width: 140px;
            height: auto;
            display: block;
            margin: 40vh auto 0;
        }
    </style>
    <div id="app">
        <img class="loading-logo" src="/images/resized-logo.png" alt="Loading..." />
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.syncCartBottomPadding = function (summaryEl) {
            if (!summaryEl) return;
            var wrapper = document.querySelector(".cart-items-wrapper");
            if (!wrapper) return;
            var height = summaryEl.getBoundingClientRect().height;
            wrapper.style.paddingBottom = (height + 100 + 24) + "px";
        };


        window.checkCartNeedsCollapse = function (wrapperEl, summaryEl) {
            if (!wrapperEl || !summaryEl) return false;

            var layoutBody = document.getElementById("main-body");
            if (!layoutBody) return false;

            var availableHeight = layoutBody.clientHeight;
            var summaryHeight = summaryEl.getBoundingClientRect().height;

            var contentHeight = wrapperEl.scrollHeight - (parseInt(wrapperEl.style.paddingBottom) || 0);

            return contentHeight > (availableHeight - summaryHeight - 16);
        };

        window.setupCartScrollListener = function (dotnetRef) {
            var body = document.getElementById("main-body") || document.documentElement;
            var lastScrollTop = 0;

            function onScroll() {
                var scrollTop = body.scrollTop;
                var direction = scrollTop > lastScrollTop ? "down" : "up";
                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
                dotnetRef.invokeMethodAsync("OnCartScroll", scrollTop, direction);
            }

            body._cartScrollHandler = onScroll;
            body.addEventListener("scroll", onScroll);
        };

        window.removeCartScrollListener = function () {
            var body = document.getElementById("main-body") || document.documentElement;
            if (!body || !body._cartScrollHandler) return;
            body.removeEventListener("scroll", body._cartScrollHandler);
            delete body._cartScrollHandler;
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oooh+Baby&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oooh+Baby&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
    </style>

    <script src="js/bitrixchat2.js"></script>
    <script src="js/upsellstrip.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>

    <!--ukrywanie header'a-->
    <script>
        window.initHeaderScroll = (bodyId, headerId) => {
            const scrollContainer = document.getElementById(bodyId);
            const header = document.getElementById(headerId);
            let lastScrollTop = 0;

            if (!scrollContainer || !header) return;

            scrollContainer.addEventListener('scroll', () => {
                const scrollTop = scrollContainer.scrollTop;

                if (scrollTop < 0) return;

                if (scrollTop > lastScrollTop && scrollTop > 30) {
                    header.classList.add('hide');
                } else {
                    header.classList.remove('hide');
                }
                lastScrollTop = scrollTop;
            });
        };
    </script>
</body>

</html>
