    <script>
        window.__staywellAppInsightsConnectionString = "InstrumentationKey=0fdb8d76-efd0-4df8-a434-285fcce6e965;IngestionEndpoint=https://polandcentral-0.in.applicationinsights.azure.com/;LiveEndpoint=https://polandcentral.livediagnostics.monitor.azure.com/;ApplicationId=3f06e4d1-29f7-4a4f-9193-2d22b49ee1bb";

        window.staywellTelemetry = (function () {
            var initialized = false;
            var appInsights = null;

            function toProperties(properties) {
                if (!properties) {
                    return {};
                }

                var sanitized = {};
                Object.keys(properties).forEach(function (key) {
                    var value = properties[key];
                    sanitized[key] = value === null || value === undefined ? "" : String(value);
                });

                return sanitized;
            }

            function getAppInsights() {
                if (appInsights || !window.Microsoft || !window.Microsoft.ApplicationInsights || !window.Microsoft.ApplicationInsights.ApplicationInsights) {
                    return appInsights;
                }

                appInsights = new window.Microsoft.ApplicationInsights.ApplicationInsights({
                    config: {
                        connectionString: window.__staywellAppInsightsConnectionString,
                        enableAutoRouteTracking: true,
                        disableFetchTracking: false,
                        disableAjaxTracking: false,
                        autoTrackPageVisitTime: true
                    }
                });

                appInsights.loadAppInsights();
                appInsights.trackPageView();

                return appInsights;
            }

            function trackException(payload) {
                var client = getAppInsights();
                if (!client || !payload) {
                    return;
                }

                var error = new Error(payload.message || "Frontend exception");
                if (payload.type) {
                    error.name = payload.type;
                }
                if (payload.stack) {
                    error.stack = payload.stack;
                }

                client.trackException({
                    exception: error,
                    properties: toProperties(payload.properties)
                });
            }

            function trackMessage(payload) {
                var client = getAppInsights();
                if (!client || !payload || !payload.message) {
                    return;
                }

                client.trackTrace({
                    message: payload.message,
                    properties: toProperties(payload.properties),
                    severityLevel: 3
                });
            }

            function init() {
                if (initialized) {
                    return;
                }

                initialized = true;
                getAppInsights();

                window.addEventListener("error", function (event) {
                    trackException({
                        message: event && event.message ? event.message : "Unhandled window error",
                        type: event && event.error && event.error.name ? event.error.name : "JavaScriptError",
                        stack: event && event.error && event.error.stack ? event.error.stack : null,
                        properties: {
                            source: "window.onerror",
                            fileName: event && event.filename ? event.filename : "",
                            lineNumber: event && event.lineno ? event.lineno : "",
                            columnNumber: event && event.colno ? event.colno : "",
                            currentUrl: window.location.href
                        }
                    });
                });

                window.addEventListener("unhandledrejection", function (event) {
                    var reason = event ? event.reason : null;
                    trackException({
                        message: reason && reason.message ? reason.message : "Unhandled promise rejection",
                        type: reason && reason.name ? reason.name : "UnhandledPromiseRejection",
                        stack: reason && reason.stack ? reason.stack : (typeof reason === "string" ? reason : JSON.stringify(reason)),
                        properties: {
                            source: "window.unhandledrejection",
                            currentUrl: window.location.href
                        }
                    });
                });
            }

            return {
                init: init,
                trackException: trackException,
                trackMessage: trackMessage
            };
        })();

        window.blazorCulture = {
            get: function () {
                try {
                    return localStorage.getItem("staywell_language_preference") || null;
                } catch (_) { return null; }
            },
            set: function (value) {
                try {
                    localStorage.setItem("staywell_language_preference", value);
                } catch (_) { /* Safari private-browsing — silently ignore */ }
            }
        };

        (function () {
            if (window.blazorCulture.get()) return;

            // Specyfika systemów apple
            var raw = (navigator.language || navigator.userLanguage || "en-US").toLowerCase();
            var culture = raw.startsWith("pl") ? "pl-PL" : "en-US";

            window.blazorCulture.set(culture);
            document.documentElement.lang = culture.substring(0, 2);
        })();
    </script>

    <script>
        window.syncCartBottomPadding = function (summaryEl) {
            if (!summaryEl) return;
            var wrapper = document.querySelector(".cart-items-wrapper");
            if (!wrapper) return;
            var height = summaryEl.getBoundingClientRect().height;
            wrapper.style.paddingBottom = (height + 100 + 24) + "px";
        };

        window.checkCartNeedsCollapse = function (wrapperEl, summaryEl) {
            if (!wrapperEl || !summaryEl) return false;

            var layoutBody = document.getElementById("main-body");
            if (!layoutBody) return false;

            var availableHeight = layoutBody.clientHeight;
            var summaryHeight = summaryEl.getBoundingClientRect().height;

            var contentHeight = wrapperEl.scrollHeight - (parseInt(wrapperEl.style.paddingBottom) || 0);

            return contentHeight > (availableHeight - summaryHeight - 16);
        };

        window.setupCartScrollListener = function (dotnetRef) {
            var body = document.getElementById("main-body") || document.documentElement;
            var lastScrollTop = 0;

            function onScroll() {
                var scrollTop = body.scrollTop;
                var direction = scrollTop > lastScrollTop ? "down" : "up";
                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
                dotnetRef.invokeMethodAsync("OnCartScroll", scrollTop, direction);
            }

            body._cartScrollHandler = onScroll;
            body.addEventListener("scroll", onScroll, { passive: true });
        };

        window.removeCartScrollListener = function () {
            var body = document.getElementById("main-body") || document.documentElement;
            if (!body || !body._cartScrollHandler) return;
            body.removeEventListener("scroll", body._cartScrollHandler);
            delete body._cartScrollHandler;
        };
    </script>

    <script>
        window.initHeaderScroll = (bodyId, headerId) => {
            const scrollContainer = document.getElementById(bodyId);
            const header = document.getElementById(headerId);
            let lastScrollTop = 0;
            let rafPending = false;

            if (!scrollContainer || !header) return;

            if (scrollContainer._headerScrollHandler) {
                scrollContainer.removeEventListener('scroll', scrollContainer._headerScrollHandler);
            }

            let upwardDelta = 0;
            scrollContainer._headerScrollHandler = () => {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(() => {
                    rafPending = false;
                    const scrollTop = scrollContainer.scrollTop;
                    if (scrollTop < 0) return;
                    const delta = scrollTop - lastScrollTop;
                    if (delta > 0 && scrollTop > 30) {
                        upwardDelta = 0;
                        header.classList.add('hide');
                    } else if (delta < 0) {
                        upwardDelta -= delta;
                        if (upwardDelta > 10) {
                            header.classList.remove('hide');
                        }
                    }
                    lastScrollTop = scrollTop;
                });
            };

            scrollContainer.addEventListener('scroll', scrollContainer._headerScrollHandler, { passive: true });
        };

        window.removeHeaderScroll = (bodyId) => {
            const scrollContainer = document.getElementById(bodyId);
            if (!scrollContainer || !scrollContainer._headerScrollHandler) return;
            scrollContainer.removeEventListener('scroll', scrollContainer._headerScrollHandler);
            delete scrollContainer._headerScrollHandler;
        };
    </script>
    <script>
        window.setupInstructionShortcutScrollReset = function (dotnetRef) {
            var container = document.getElementById("main-body") || document.documentElement;
            if (!container) return;

            if (container._instructionShortcutResetHandler) {
                container.removeEventListener("scroll", container._instructionShortcutResetHandler);
            }

            container._instructionShortcutResetDotnetRef = dotnetRef;
            container._instructionUserScrolling = false;

            container._instructionUserIntentHandler = function () {
                container._instructionUserScrolling = true;
            };

            container._instructionShortcutResetHandler = function () {
                if (container._instructionAutoScrolling) return;
                if (!container._instructionUserScrolling) return;
                if (!container._instructionShortcutResetDotnetRef) return;

                container._instructionShortcutResetDotnetRef.invokeMethodAsync("ResetActiveShortcutFromScroll");
                container._instructionUserScrolling = false;
            };

            container.addEventListener("wheel", container._instructionUserIntentHandler, { passive: true });
            container.addEventListener("touchmove", container._instructionUserIntentHandler, { passive: true });
            container.addEventListener("scroll", container._instructionShortcutResetHandler, { passive: true });
        };

        window.removeInstructionShortcutScrollReset = function () {
            var container = document.getElementById("main-body") || document.documentElement;
            if (!container) return;

            if (container._instructionShortcutResetHandler) {
                container.removeEventListener("scroll", container._instructionShortcutResetHandler);
                delete container._instructionShortcutResetHandler;
            }

            if (container._instructionUserIntentHandler) {
                container.removeEventListener("wheel", container._instructionUserIntentHandler);
                container.removeEventListener("touchmove", container._instructionUserIntentHandler);
                delete container._instructionUserIntentHandler;
            }

            delete container._instructionShortcutResetDotnetRef;
        };

        window.scrollInMainBodyToElement = function (elementId) {
            return new Promise(function (resolve) {
                var target = document.getElementById(elementId);
                if (!target) {
                    resolve();
                    return;
                }

                var container = document.getElementById("main-body");
                if (!container) {
                    target.scrollIntoView({ behavior: "smooth", block: "start" });
                    setTimeout(resolve, 500);
                    return;
                }

                container._instructionAutoScrolling = true;
                container._instructionUserScrolling = false;

                if (container._instructionAutoScrollingTimeout) {
                    clearTimeout(container._instructionAutoScrollingTimeout);
                }

                var containerRect = container.getBoundingClientRect();
                var targetRect = target.getBoundingClientRect();
                var top = targetRect.top - containerRect.top + container.scrollTop - 100;

                container.scrollTo({
                    top: Math.max(top, 0),
                    behavior: "smooth"
                });

                container._instructionAutoScrollingTimeout = setTimeout(function () {
                    container._instructionAutoScrolling = false;
                    resolve();
                }, 700);
            });
        };
    </script>

    <script>
        window._guideSwipeSyncing = false;

        window.initGuideCardSwipe = function (dotNetRef) {
            var track = document.getElementById('guide-slide-track');
            if (!track) return;

            var lastNotifiedIndex = -1;
            var rafPending = false;

            function updateDots(progress) {
                var dots = document.querySelectorAll('.guide-card__dots .dot');
                var snapped = Math.round(progress);
                dots.forEach(function (dot, i) {
                    if (i === snapped) dot.classList.add('dot--active');
                    else dot.classList.remove('dot--active');
                });
            }

            track.addEventListener('scroll', function () {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(function () {
                    rafPending = false;
                    var progress = track.scrollLeft / track.clientWidth;
                    updateDots(progress);
                });
            }, { passive: true });

            track.addEventListener('scrollend', function () {
                var index = Math.round(track.scrollLeft / track.clientWidth);
                updateDots(index);
                if (index === lastNotifiedIndex) return;
                lastNotifiedIndex = index;
                dotNetRef.invokeMethodAsync('OnSwipeSlide', index);
            }, { passive: true });
        };

        window.scrollGuideTrack = function (index) {
            var track = document.getElementById('guide-slide-track');
            if (track) track.scrollTo({ left: track.clientWidth * index, behavior: 'smooth' });
        };
    </script>
